<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Fiza 🎉</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* LANDING */
#page1 {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-size: 60px;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4081;
  cursor: pointer;
  margin-top: 20px;
}

/* MODAL */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 80%;
  border-radius: 20px;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

#hint {
  position: absolute;
  bottom: 40px;
  color: white;
  font-size: 18px;
}

/* GIFT GRID */
#page2 {
  display: none;
  padding: 40px;
}

.gifts {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.gift {
  background: white;
  color: black;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.gift:hover {
  transform: scale(1.05);
}

.gift img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* RESULT */
#page3 {
  display: none;
  margin-top: 100px;
  font-size: 30px;
}

/* CONFETTI */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- PAGE 1 -->
<div id="page1">
  <h1>🎉 HAPPY BIRTHDAY FIZA 🎉</h1>
  <button onclick="handleClick()">Select Your Gift 🎁</button>
</div>

<!-- MODAL -->
<div id="modal" onclick="handleClick()">
  <img id="modalImg" src="">
  <p id="hint">Tap to continue →</p>
</div>

<!-- PAGE 2 -->
<div id="page2">
  <h2>Choose your gift 😏</h2>
  <div class="gifts">

    <div class="gift" onclick="selectGift('a Big Mansion')">
      <img src="mansion.jpg">
      <p>Big Mansion</p>
    </div>

    <div class="gift" onclick="selectGift('Private Island')">
      <img src="elon.jpg">
      <p>Elon Musk</p>
    </div>

    <div class="gift" onclick="selectGift('a Sports Car')">
      <img src="car.jpg">
      <p>Sports Car</p>
    </div>

    <div class="gift" onclick="selectGift('a Private Jet')">
      <img src="jet.jpg">
      <p>Jet</p>
    </div>

    <div class="gift" onclick="selectGift('a Luxury Cruise')">
      <img src="cruise.jpg">
      <p>Cruise</p>
    </div>

    <div class="gift" onclick="selectGift('Burj Khalifa')">
      <img src="burj.jpg">
      <p>Burj Khalifa</p>
    </div>

  </div>
</div>

<!-- PAGE 3 -->
<div id="page3">
  <h2 id="result"></h2>
</div>

<!-- AUDIO -->
<audio id="bgMusic" src="fahhh.mp3"></audio>

<script>
let clickCount = 0;

function handleClick() {
  clickCount++;

  const modal = document.getElementById("modal");
  const img = document.getElementById("modalImg");
  const music = document.getElementById("bgMusic");

  if (clickCount === 1) {
    modal.style.display = "flex";
    img.style.opacity = 0;

    setTimeout(() => {
      img.src = "fiza1.jpeg";
      img.style.opacity = 1;
    }, 100);

    music.currentTime = 0;
    music.volume = 0.7;
    music.play();
  }

  else if (clickCount === 2) {
    img.style.opacity = 0;

    setTimeout(() => {
      img.src = "fiza2.png";
      img.style.opacity = 1;
    }, 200);

    music.currentTime = 0;
    music.play();
  }

  else if (clickCount === 3) {
    modal.style.display = "none";
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
  }
}

function selectGift(gift) {
  document.getElementById("page2").style.display = "none";
  document.getElementById("page3").style.display = "block";

  document.getElementById("result").innerText =
    "🎉 Congrats! Aafia has bought you " + gift + " 💖";

  startConfetti();
}

/* CONFETTI */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function startConfetti() {
  for (let i = 0; i < 200; i++) {
    confetti.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 6,
      d: Math.random() * 5
    });
  }
  animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  confetti.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fill();
  });

  confetti.forEach(c => {
    c.y += c.d;
    if (c.y > canvas.height) c.y = 0;
  });

  requestAnimationFrame(animateConfetti);
}
</script>

</body>
</html>
